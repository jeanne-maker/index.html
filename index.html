<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永芳國小 Phonics 口說小高手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 2rem; border: 2px solid #bae6fd; }
        .record-btn.active { animation: pulse 1.5s infinite; background-color: #f43f5e; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.7); } 70% { transform: scale(1.1); box-shadow: 0 0 0 15px rgba(244, 63, 94, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 63, 94, 0); } }
        .progress-bar { transition: width 0.5s ease-in-out; }
        .tab-btn.active { background-color: #0284c7; color: white; }
    </style>
</head>
<body class="p-4 md:p-8">

<div id="app" class="max-w-2xl mx-auto">
    <!-- 登入與選單介面 -->
    <div id="login-screen" class="glass-card p-8 shadow-2xl text-center border-t-8 border-t-sky-500">
        <div class="mb-2 text-sky-600 font-bold tracking-widest text-sm">永芳國小專屬教材 🏠</div>
        <h1 class="text-3xl font-extrabold text-sky-700 mb-6 flex items-center justify-center gap-2">
            Phonics 口說小高手 🌟
        </h1>
        <div class="space-y-4 text-left">
            <label class="block text-sm font-bold text-gray-500 ml-2">我的班級</label>
            <input type="text" id="student-class" placeholder="例如：301" class="w-full p-4 rounded-xl border-2 border-sky-100 focus:border-sky-500 outline-none transition-all mb-2 text-lg">
            <label class="block text-sm font-bold text-gray-500 ml-2">我的座號</label>
            <input type="text" id="student-id" placeholder="例如：05" class="w-full p-4 rounded-xl border-2 border-sky-100 focus:border-sky-500 outline-none transition-all mb-2 text-lg">
            <label class="block text-sm font-bold text-gray-500 ml-2">我的姓名</label>
            <input type="text" id="student-name" placeholder="請輸入姓名" class="w-full p-4 rounded-xl border-2 border-sky-100 focus:border-sky-500 outline-none transition-all mb-6 text-lg">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="startPracticeMode()" class="bg-white text-sky-600 border-2 border-sky-600 font-bold py-4 rounded-2xl hover:bg-sky-50 transition-colors shadow-md flex flex-col items-center gap-1">
                    <i data-lucide="book-open"></i> 先練習一下
                </button>
                <button onclick="startQuiz()" class="bg-sky-600 text-white font-bold py-4 rounded-2xl hover:bg-sky-700 transition-colors shadow-lg shadow-sky-200 flex flex-col items-center gap-1">
                    <i data-lucide="zap"></i> 開始大挑戰
                </button>
            </div>
        </div>
        <p class="mt-6 text-sm text-sky-400 font-medium italic text-center">小朋友別緊張，大聲唸出來就有獎勵喔！加油！💪</p>
    </div>

    <!-- 練習模式介面 -->
    <div id="practice-screen" class="hidden space-y-6">
        <div class="glass-card p-6 shadow-xl border-t-8 border-t-emerald-500">
            <div class="flex justify-between items-center mb-6">
                <button onclick="backToMenu()" class="text-gray-400 hover:text-gray-600 flex items-center gap-1 text-sm font-bold">
                    <i data-lucide="chevron-left" class="w-4 h-4"></i> 回去首頁
                </button>
                <span class="bg-emerald-100 text-emerald-600 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider text-nowrap">熱身練習中</span>
            </div>

            <div class="flex gap-2 mb-6 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="switchPracticeTab('short')" id="tab-short" class="tab-btn active shrink-0 px-5 py-2 rounded-xl border-2 border-sky-500 text-sky-600 font-bold text-sm transition-all">短母音</button>
                <button onclick="switchPracticeTab('long')" id="tab-long" class="tab-btn shrink-0 px-5 py-2 rounded-xl border-2 border-sky-500 text-sky-600 font-bold text-sm transition-all">長母音</button>
                <button onclick="switchPracticeTab('chant')" id="tab-chant" class="tab-btn shrink-0 px-5 py-2 rounded-xl border-2 border-sky-500 text-sky-600 font-bold text-sm transition-all">讀句子</button>
            </div>

            <div class="text-center py-10 bg-sky-50 rounded-3xl mb-6">
                <p id="practice-text" class="text-5xl font-black text-sky-900 mb-8 tracking-wide">Select</p>
                <div class="flex justify-center gap-4">
                    <button onclick="playVoice('practice')" class="flex items-center gap-2 bg-white text-sky-600 border-2 border-sky-200 px-10 py-4 rounded-full hover:bg-sky-100 transition-all font-bold shadow-sm text-lg">
                        <i data-lucide="volume-2"></i> 聽聽看
                    </button>
                </div>
            </div>

            <div class="flex flex-col items-center gap-4 border-t border-dashed border-sky-200 pt-8">
                <button id="practice-record-btn" 
                        onclick="toggleRecording('practice')"
                        class="record-btn w-24 h-24 rounded-full bg-sky-600 text-white flex items-center justify-center shadow-xl transition-all outline-none">
                    <i data-lucide="mic" class="w-10 h-10"></i>
                </button>
                <p id="practice-status-hint" class="text-md text-sky-600 font-bold text-center">點一下開始說話</p>
                <p id="practice-recognized" class="text-xl font-bold text-pink-600 mt-2 min-h-[1.5rem] text-center italic"></p>
            </div>
            
            <div id="practice-list" class="mt-8 grid grid-cols-2 sm:grid-cols-3 gap-3">
                <!-- 動態生成 -->
            </div>
        </div>
    </div>

    <!-- 測驗介面 -->
    <div id="quiz-screen" class="hidden space-y-6">
        <div class="glass-card p-6 shadow-xl relative border-t-8 border-t-sky-500">
            <div class="flex justify-between items-center mb-4">
                <span id="progress-text" class="text-sky-600 font-bold text-sm">第 1 / 10 題</span>
                <div class="w-32 bg-gray-200 rounded-full h-3">
                    <div id="progress-fill" class="progress-bar bg-sky-500 h-3 rounded-full" style="width: 10%"></div>
                </div>
            </div>
            
            <div class="text-center py-12 bg-sky-50 rounded-3xl mb-8">
                <p id="target-text" class="text-5xl font-black text-sky-900 mb-4 tracking-wide">Loading...</p>
                <p id="target-hint" class="text-sm text-sky-400 font-bold tracking-widest uppercase mb-8">永芳小朋友最棒，唸出來！</p>
                <div class="flex justify-center gap-4">
                    <button onclick="playVoice('quiz')" class="flex items-center gap-2 bg-white text-sky-600 border-2 border-sky-200 px-8 py-3 rounded-full hover:bg-sky-100 transition-all font-bold shadow-sm">
                        <i data-lucide="volume-2"></i> 聽一次
                    </button>
                </div>
            </div>

            <div class="flex flex-col items-center gap-4 border-t border-dashed border-sky-200 pt-8">
                <button id="record-btn" 
                        onclick="toggleRecording('quiz')"
                        class="record-btn w-28 h-28 rounded-full bg-sky-600 text-white flex items-center justify-center shadow-2xl transition-all outline-none">
                    <i data-lucide="mic" class="w-12 h-12"></i>
                </button>
                <p id="status-hint" class="text-lg text-sky-700 font-black text-center">點一下麥克風錄音</p>
            </div>
        </div>

        <!-- 辨識結果 -->
        <div id="result-card" class="glass-card p-6 shadow-lg hidden bg-white">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-xs text-sky-300 uppercase tracking-widest font-bold">你說的是：</p>
                    <p id="recognized-text" class="text-2xl font-black text-pink-500 mt-1 italic">...</p>
                </div>
                <div class="text-right">
                    <p class="text-xs text-sky-300 uppercase tracking-widest font-bold">小高手分數</p>
                    <p id="score-text" class="text-4xl font-black text-sky-600">0%</p>
                </div>
            </div>
        </div>

        <button id="next-btn" onclick="nextQuestion()" class="hidden w-full bg-sky-500 text-white font-black py-5 rounded-2xl hover:bg-sky-600 transition-colors shadow-lg text-xl tracking-widest">
            下一題 Go! 🚀
        </button>
    </div>

    <!-- 結業證書 -->
    <div id="finish-screen" class="hidden glass-card p-10 shadow-2xl text-center border-t-8 border-t-yellow-400">
        <div class="flex justify-center mb-6">
            <div class="relative">
                <i data-lucide="award" class="w-24 h-24 text-yellow-500"></i>
                <i data-lucide="star" class="w-8 h-8 text-pink-400 absolute -top-2 -right-2 animate-bounce"></i>
            </div>
        </div>
        <h2 class="text-3xl font-black text-sky-900 mb-2 text-nowrap">永芳國小口說小英雄！</h2>
        <p class="text-sky-600 font-bold mb-4 text-center">你真的很棒喔！</p>
        <p id="final-stats" class="text-4xl font-black text-pink-500 mb-10 text-center">平均分數：0 分</p>
        <button id="submit-btn" onclick="submitToSheets()" class="w-full bg-sky-600 text-white font-black py-5 rounded-2xl hover:bg-sky-700 shadow-xl flex items-center justify-center gap-2 text-xl">
            <i data-lucide="send"></i> 把成績給老師看
        </button>
        <div id="success-area" class="hidden mt-8">
            <p class="text-2xl font-black text-emerald-600 flex items-center justify-center gap-2">
                <i data-lucide="party-popper"></i> 繳交成功囉！
            </p>
            <p class="text-sm text-gray-400 mt-3 text-center">快去領小貼紙吧！🍭</p>
        </div>
        <button onclick="location.reload()" class="mt-10 text-sky-400 font-bold hover:underline">重新挑戰一次</button>
    </div>
</div>

<script>
    lucide.createIcons();

    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby017L3zGb2Pu2prZsIyUrtIEsCRcn4RvZoYIW1VTmDidsKV1GN1-UASLdro-D7u8Ao/exec"; 

    const poolShort = ["kit", "Tim", "wig", "not", "cod", "rod", "hop", "cut", "tub", "duck"];
    const poolLong = ["kite", "time", "five", "ride", "note", "code", "hope", "cute", "tube", "cube", "tune", "dune", "mute"];
    const poolChant = [
        "Tim is five.", "He can ride a bike.", "Kim is nine.", "She can make a kite.", 
        "Bob has a cod.", "The cod is in the pot.", "Duke is a duck.", "He's in the tub.", 
        "Duke is cute.", "He likes ice cubes."
    ];

    let questions = [];
    let currentIdx = 0;
    let scores = [];
    let recognizedHistory = [];
    let studentInfo = { className: "", id: "", name: "" };
    let recognition;
    let isRecording = false;
    let currentMode = 'quiz';
    let currentPracticeItem = "";

    function getRandomItems(arr, count) {
        return [...arr].sort(() => 0.5 - Math.random()).slice(0, count);
    }

    function generateQuestions() {
        questions = [];
        getRandomItems(poolShort, 3).forEach(word => questions.push({ text: word, type: "Short Vowel" }));
        getRandomItems(poolLong, 3).forEach(word => questions.push({ text: word, type: "Long Vowel" }));
        getRandomItems(poolChant, 4).forEach(sentence => questions.push({ text: sentence, type: "Easy Sentence" }));
    }

    function initRecognition() {
        if (!('webkitSpeechRecognition' in window)) {
            alert("❌ 您的設備或瀏覽器不支援錄音。請改用 Google Chrome 或 Safari 開啟本網頁。");
            return;
        }
        
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        recognition.onstart = () => {
            isRecording = true;
            const btnId = currentMode === 'quiz' ? 'record-btn' : 'practice-record-btn';
            const hintId = currentMode === 'quiz' ? 'status-hint' : 'practice-status-hint';
            document.getElementById(btnId).classList.add('active');
            document.getElementById(hintId).innerText = "正在聽你說話...";
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            if (currentMode === 'quiz') {
                const target = questions[currentIdx].text.toLowerCase().replace(/[.,!]/g, "");
                const recognized = transcript.toLowerCase().replace(/[.,!]/g, "");
                const score = calculateSimilarity(target, recognized);
                displayResult(transcript, score);
            } else {
                document.getElementById('practice-recognized').innerText = `"${transcript}"`;
                document.getElementById('practice-status-hint').innerText = "唸得好！再試試別的？";
            }
        };

        recognition.onerror = (event) => {
            isRecording = false;
            const btnId = currentMode === 'quiz' ? 'record-btn' : 'practice-record-btn';
            const hintId = currentMode === 'quiz' ? 'status-hint' : 'practice-status-hint';
            document.getElementById(btnId).classList.remove('active');
            document.getElementById(hintId).innerText = "沒聽清楚，再點一下試試！";
        };

        recognition.onend = () => {
            isRecording = false;
            const btnId = currentMode === 'quiz' ? 'record-btn' : 'practice-record-btn';
            document.getElementById(btnId).classList.remove('active');
        };
    }

    function toggleRecording(mode) {
        currentMode = mode;
        if (!isRecording) {
            try {
                if (!recognition) initRecognition();
                if (recognition) recognition.start();
            } catch (e) {
                console.error("Start error:", e);
                isRecording = false;
                initRecognition();
            }
        } else {
            if (recognition) recognition.stop();
        }
    }

    function calculateSimilarity(target, recognized) {
        const numberMap = {
            "1": "one", "2": "two", "3": "three", "4": "four", "5": "five",
            "6": "six", "7": "seven", "8": "eight", "9": "nine", "10": "ten"
        };
        const targetWords = target.split(/\s+/);
        const recognizedWords = recognized.split(/\s+/).map(w => numberMap[w] || w);
        let matches = 0;
        targetWords.forEach(tWord => {
            if (recognizedWords.some(rWord => rWord.includes(tWord) || tWord.includes(rWord))) {
                matches++;
            }
        });
        let base = Math.round((matches / targetWords.length) * 100);
        let finalScore = Math.min(100, base + 30);
        if (recognizedWords.length > 0 && finalScore < 60) finalScore = 60;
        return finalScore;
    }

    function displayResult(transcript, score) {
        document.getElementById('result-card').classList.remove('hidden');
        document.getElementById('recognized-text').innerText = `"${transcript}"`;
        document.getElementById('score-text').innerText = `${score}%`;
        scores[currentIdx] = score;
        recognizedHistory[currentIdx] = transcript;
        document.getElementById('next-btn').classList.remove('hidden');
        document.getElementById('status-hint').innerText = "辨識完成！點下一題吧";
    }

    function startPracticeMode() {
        currentMode = 'practice';
        initRecognition();
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('practice-screen').classList.remove('hidden');
        switchPracticeTab('short');
    }

    function switchPracticeTab(type) {
        const tabs = ['short', 'long', 'chant'];
        tabs.forEach(t => document.getElementById(`tab-${t}`).classList.remove('active'));
        document.getElementById(`tab-${type}`).classList.add('active');
        const list = document.getElementById('practice-list');
        list.innerHTML = "";
        let data = type === 'short' ? poolShort : (type === 'long' ? poolLong : poolChant);
        data.forEach(item => {
            const btn = document.createElement('button');
            btn.className = "p-4 bg-white border-2 border-sky-100 rounded-2xl text-md font-bold text-sky-700 hover:bg-sky-50 transition-all text-center shadow-sm";
            btn.innerText = item;
            btn.onclick = () => selectPracticeItem(item);
            list.appendChild(btn);
        });
        if (data.length > 0) selectPracticeItem(data[0]);
    }

    function selectPracticeItem(text) {
        currentPracticeItem = text;
        document.getElementById('practice-text').innerText = text;
        document.getElementById('practice-recognized').innerText = "";
        document.getElementById('practice-status-hint').innerText = "點麥克風唸唸看";
    }

    function backToMenu() {
        document.getElementById('practice-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
    }

    function startQuiz() {
        const c = document.getElementById('student-class').value;
        const i = document.getElementById('student-id').value;
        const n = document.getElementById('student-name').value;
        if (!c || !i || !n) { alert("小朋友，班級、座號和名字都要寫喔！"); return; }
        studentInfo = { className: c, id: i, name: n };
        currentMode = 'quiz';
        generateQuestions();
        initRecognition();
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const q = questions[currentIdx];
        document.getElementById('target-text').innerText = q.text;
        document.getElementById('target-hint').innerText = "永芳小朋友最棒，唸出來！";
        document.getElementById('progress-text').innerText = `第 ${currentIdx + 1} / 10 題`;
        document.getElementById('progress-fill').style.width = `${((currentIdx + 1) / 10) * 100}%`;
        document.getElementById('result-card').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('status-hint').innerText = "點一下麥克風錄音";
    }

    function playVoice(mode) {
        const text = mode === 'quiz' ? questions[currentIdx].text : currentPracticeItem;
        if (!text) return;
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.6; // 速度調慢一點，讓小朋友聽得清楚
        window.speechSynthesis.speak(u);
    }

    function nextQuestion() {
        if (currentIdx < 9) { currentIdx++; showQuestion(); }
        else { showFinish(); }
    }

    function showFinish() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('finish-screen').classList.remove('hidden');
        const avg = Math.round(scores.reduce((a,b)=>a+b,0)/10);
        document.getElementById('final-stats').innerText = `平均分數：${avg} 分`;
    }

    async function submitToSheets() {
        const avg = Math.round(scores.reduce((a,b)=>a+b,0)/10);
        const data = { ...studentInfo, totalScore: avg, record: recognizedHistory };
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('submit-btn').innerText = "正在交給老師...";
        if (GAS_WEB_APP_URL && GAS_WEB_APP_URL.includes("google.com")) {
            try {
                await fetch(GAS_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(data)
                });
                document.getElementById('submit-btn').classList.add('hidden');
                document.getElementById('success-area').classList.remove('hidden');
            } catch (e) {
                alert("繳交失敗，請檢查網路。");
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('submit-btn').innerText = "按此繳交成績";
            }
        } else {
            alert("GAS 網址設定有誤。");
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "按此繳交成績";
        }
    }
</script>

</body>
</html>
